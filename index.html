<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>生活中的数学 · 一年级挑战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #EFF5E8;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', 'Noto Sans', sans-serif;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-card {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 40px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        /* 标题居中突出 */
        .game-title {
            text-align: center;
            padding: 20px 16px 12px;
            background: white;
        }
        .game-title h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #2B6E2F;
            letter-spacing: 2px;
            background: #F0F9E8;
            display: inline-block;
            padding: 6px 28px;
            border-radius: 60px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }

        /* 状态栏 */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #FFFFFF;
            padding: 8px 20px;
            border-bottom: 1px solid #EFF3E8;
        }
        .score-badge {
            background: #F2F7EC;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #3C6B2F;
        }
        .timer {
            font-family: monospace;
            font-size: 1.5rem;
            font-weight: 600;
            background: #F2F7EC;
            padding: 4px 14px;
            border-radius: 40px;
            color: #2B5E1E;
        }

        /* 学生信息行 */
        .student-row {
            background: #FEFCF5;
            padding: 8px 20px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #6F8F5C;
            border-bottom: 1px solid #F0F2E9;
            display: flex;
            justify-content: space-between;
        }

        .illustration {
            text-align: center;
            font-size: 2rem;
            padding: 10px 0 5px;
            background: white;
            color: #9AB87A;
        }

        .question-panel {
            padding: 16px 20px 24px;
        }

        .question-text {
            background: #FCFCF8;
            border-radius: 32px;
            padding: 20px 16px;
            font-size: 1.4rem;
            font-weight: 500;
            line-height: 1.4;
            text-align: center;
            color: #2E4A25;
            border: 1px solid #E4E8DA;
            margin-bottom: 24px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .option {
            background: #FEFEF9;
            border: 1px solid #DDE0D4;
            border-radius: 60px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: 0.1s;
            font-size: 1.05rem;
            font-weight: 500;
            color: #2B3B26;
        }

        .option:active { background: #ECF3E5; transform: scale(0.98); }
        .option.disabled, .option:disabled { opacity: 0.6; background: #F7F7F2; cursor: default; transform: none; }

        .option-prefix {
            background: #E3ECD9;
            width: 38px;
            height: 38px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: #49653E;
        }

        .feedback {
            background: #F8FBF4;
            border-radius: 28px;
            padding: 12px 16px;
            font-size: 0.9rem;
            text-align: center;
            color: #6B7A5E;
            margin-bottom: 20px;
            border-left: 3px solid #B6D7A8;
        }

        /* 双按钮同行：重玩左，开始右 */
        .double-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .btn {
            flex: 1;
            border: none;
            border-radius: 60px;
            padding: 12px 0;
            font-size: 1rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: 0.1s;
            text-align: center;
        }
        .btn:active { transform: scale(0.97); }
        
        /* 重玩按钮样式 */
        .btn-restart {
            background: #E9ECEF;
            color: #4A6741;
        }
        /* 开始挑战按钮：醒目的亮绿色 */
        .btn-start {
            background: #4CAF50;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .btn-start:active {
            background: #3E8E41;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 12px;
            color: #AABF97;
            border-top: 1px solid #ECEFE5;
        }

        /* 模态窗 */
        .modal-mask {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: white;
            width: 85%;
            max-width: 320px;
            border-radius: 48px;
            padding: 28px 24px 32px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
        }
        .modal-card h3 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #4A6741;
            margin-bottom: 18px;
        }
        .modal-card label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin: 14px 0 5px;
            color: #5F7353;
        }
        .modal-card select, .modal-card input {
            width: 80%;
            padding: 10px 12px;
            border-radius: 60px;
            border: 1px solid #C8D5B9;
            background: #FEFEF8;
            font-size: 1rem;
            text-align: center;
            font-family: inherit;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 25px;
        }
        .modal-buttons button {
            background: #E1EAD6;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: 500;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="game-card" id="gameApp">
    <div class="game-title">
        <h1>📚 生活中的数学 ✨</h1>
    </div>
    <div class="stats-bar">
        <div class="score-badge" id="scoreBadge">✅ 答对 0 / 5</div>
        <div class="timer" id="timerDisplay">00:00</div>
    </div>
    <div class="student-row" id="studentInfoRow">
        🧸 未开始挑战
    </div>
    <div class="illustration" id="illustration">
        🧸📖
    </div>
    <div class="question-panel">
        <div class="question-text" id="questionText">
            点击下方绿色按钮开始挑战
        </div>
        <div class="options-list" id="optionsContainer"></div>
        <div class="feedback" id="feedbackMsg">
            🌱 选出答案，答对自动下一题
        </div>
        <!-- 双按钮同行：重玩左，开始右 -->
        <div class="double-buttons">
            <button class="btn btn-restart" id="restartBtn">🔄 重玩</button>
            <button class="btn btn-start" id="startBtn">✨ 开始挑战 ✨</button>
        </div>
    </div>
    <footer>随机5题 · 答对得分，答错看提示自动继续</footer>
</div>

<script>
    // ---------- 生成200道一年级数学题库 (生活情境) ----------
    function generateFullBank() {
        const bank = [];
        let id = 0;
        const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        // 购物加法 30题
        for (let i = 0; i < 30; i++) {
            let a = rand(1, 12);
            let b = rand(1, 8);
            let total = a + b;
            let opts = [`${total-2}元`, `${total}元`, `${total+1}元`];
            bank.push({ id: id++, text: `🛒 笔记本${a}元，铅笔${b}元，一共多少钱？`, options: opts, correct: "B" });
        }
        // 排队问题 25题
        for (let i = 0; i < 25; i++) {
            let front = rand(2,5);
            let back = rand(2,6);
            let total = front + back + 1;
            let opts = [`${total-1}人`, `${total}人`, `${total+1}人`];
            bank.push({ id: id++, text: `🧑‍🤝‍🧑 从前数排第${front+1}，从后数排第${back+1}，一共多少人？`, options: opts, correct: "B" });
        }
        // 找规律 30题
        let patterns = [[2,4,6,8],[5,10,15,20],[3,6,9,12],[20,18,16,14],[1,4,7,10]];
        for (let i = 0; i < 30; i++) {
            let p = patterns[i%patterns.length];
            let next = p[3];
            let opts = [`${next-2}`, `${next}`, `${next+2}`];
            bank.push({ id: id++, text: `🔢 找规律：${p[0]}, ${p[1]}, ${p[2]}, ___ ?`, options: opts, correct: "B" });
        }
        // 减法应用题 35题
        for (let i = 0; i < 35; i++) {
            let total = rand(7,18);
            let give = rand(1,total-2);
            let left = total - give;
            let opts = [`${left+1}个`, `${left}个`, `${left-1>=0?left-1:left+2}个`];
            bank.push({ id: id++, text: `🍎 有${total}个苹果，送给朋友${give}个，还剩几个？`, options: opts, correct: "B" });
        }
        // 运动会名次 20题
        for (let i = 0; i < 20; i++) {
            let rank = rand(2,6);
            let faster = rank-1;
            let opts = [`第${faster}名`, `第${rank}名`, `第${rank+1}名`];
            bank.push({ id: id++, text: `🏅 小明第${rank}名，小红比他快1名，小红第几名？`, options: opts, correct: "A" });
        }
        // 脑筋急转弯 / 简单常识 20题
        let riddles = [
            {text:"🐦 树上有8只鸟，猎人打死1只，还剩几只？", opts:["7只","0只","8只"], correct:"B"},
            {text:"🧸 小红6岁，弟弟比她小2岁，弟弟几岁？", opts:["4岁","5岁","8岁"], correct:"A"},
            {text:"⏰ 早上8点上课，下午3点放学，在校几小时？", opts:["5小时","7小时","8小时"], correct:"B"},
            {text:"🍕 披萨切成8块，妈妈吃2块，爸爸吃3块，还剩几块？", opts:["3块","4块","5块"], correct:"A"}
        ];
        for (let i=0;i<20;i++) {
            let r = riddles[i%riddles.length];
            bank.push({ id: id++, text: r.text, options: r.opts, correct: r.correct });
        }
        // 比多少 25题
        for (let i=0;i<25;i++) {
            let a = rand(5,14);
            let b = rand(1,a-1);
            let diff = a-b;
            let opts = [`${diff-1}`, `${diff}`, `${diff+1}`];
            bank.push({ id: id++, text: `🍬 小明有${a}颗糖，小丽有${b}颗，小明比小丽多几颗？`, options: opts, correct: "B" });
        }
        // 图形 / emoji规律 15题
        let emojiPat = ["⭐🌙⭐🌙⭐___","🍎🍌🍎🍌🍎___","🔴🟡🔴🟡🔴___","🐱🐶🐱🐶🐱___"];
        for(let i=0;i<15;i++){
            let pat = emojiPat[i%4];
            let ans = (pat.includes("⭐")?"🌙":(pat.includes("🍎")?"🍌":(pat.includes("🔴")?"🟡":"🐶")));
            let opts = [ans, "？", "★"];
            if(ans==="🌙") opts = ["🌙","⭐","✨"];
            if(ans==="🍌") opts = ["🍌","🍎","🍉"];
            if(ans==="🟡") opts = ["🟡","🔴","🔵"];
            if(ans==="🐶") opts = ["🐶","🐱","🐭"];
            bank.push({ id: id++, text: `🎨 找规律：${pat} 下一个是什么？`, options: opts, correct: "A" });
        }
        // 补齐至200
        while(bank.length < 200) {
            let a = rand(2,9);
            let b = rand(2,5);
            let product = a*b;
            let opts = [`${product-2}元`,`${product}元`,`${product+1}元`];
            bank.push({ id: id++, text: `🧸 一个面包${a}元，买${b}个需要多少钱？`, options: opts, correct: "B" });
        }
        // 随机打乱顺序
        for (let i = bank.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [bank[i], bank[j]] = [bank[j], bank[i]];
        }
        return bank.slice(0,200);
    }
    const QUESTION_BANK = generateFullBank();
    
    // ---------- 游戏状态 ----------
    let currentRound = [];         // 抽取的5个题目
    let roundIndex = 0;            // 0~4
    let correctCount = 0;
    let answered = false;
    let gameActive = false;
    let timerInterval = null;
    let startTimestamp = 0;
    let studentClass = "";
    let studentName = "";
    let autoNextTimer = null;      // 自动跳转定时器

    // DOM 元素
    const scoreBadge = document.getElementById('scoreBadge');
    const timerDisplay = document.getElementById('timerDisplay');
    const studentInfoRow = document.getElementById('studentInfoRow');
    const illustration = document.getElementById('illustration');
    const questionText = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const feedbackMsg = document.getElementById('feedbackMsg');
    const restartBtn = document.getElementById('restartBtn');
    const startBtn = document.getElementById('startBtn');

    // 辅助函数
    function formatTime(sec) {
        let mins = Math.floor(sec / 60);
        let remainSec = Math.floor(sec % 60);
        return `${mins.toString().padStart(2,'0')}:${remainSec.toString().padStart(2,'0')}`;
    }
    function updateTimerUI() {
        if (!gameActive) return;
        const elapsed = Math.floor((Date.now() - startTimestamp) / 1000);
        timerDisplay.innerText = formatTime(elapsed);
    }
    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }
    function startTimer() {
        if (timerInterval) stopTimer();
        startTimestamp = Date.now();
        timerInterval = setInterval(() => {
            if (gameActive) updateTimerUI();
        }, 200);
    }
    function updateScoreUI() {
        scoreBadge.innerText = `✅ 答对 ${correctCount} / 5`;
    }
    function setOptionsEnabled(enabled) {
        const btns = document.querySelectorAll('.option');
        btns.forEach(btn => {
            if (enabled) btn.disabled = false;
            else btn.disabled = true;
        });
    }
    function clearAutoNext() {
        if (autoNextTimer) {
            clearTimeout(autoNextTimer);
            autoNextTimer = null;
        }
    }
    // 进入下一题 (自动调用)
    function advanceToNext() {
        if (!gameActive) return;
        if (roundIndex + 1 >= 5) {
            finishGame();
        } else {
            roundIndex++;
            renderCurrent();
        }
    }
    // 处理作答 (答对加分自动跳转，答错仅提示也自动跳转)
    function handleAnswer(selectedLetter) {
        if (!gameActive || answered) return;
        const q = currentRound[roundIndex];
        const isCorrect = (selectedLetter === q.correct);
        
        if (isCorrect) {
            correctCount++;
            updateScoreUI();
            feedbackMsg.innerHTML = "🎉 完全正确！ +1分 即将进入下一题～";
            feedbackMsg.style.background = "#E0F2D0";
        } else {
            let correctAns = "";
            if (q.correct === 'A') correctAns = q.options[0];
            else if (q.correct === 'B') correctAns = q.options[1];
            else correctAns = q.options[2];
            feedbackMsg.innerHTML = `❌ 噢不对，正确答案是 ${q.correct}. ${correctAns}。下一题加油哟！`;
            feedbackMsg.style.background = "#FFEFE6";
        }
        answered = true;
        setOptionsEnabled(false);
        
        // 无论对错，都自动进入下一题 (延迟稍短，错题也自动继续)
        clearAutoNext();
        autoNextTimer = setTimeout(() => {
            autoNextTimer = null;
            if (gameActive && answered) {
                advanceToNext();
            }
        }, 800);
    }
    // 渲染当前题目
    function renderCurrent() {
        if (!gameActive || currentRound.length === 0) return;
        const q = currentRound[roundIndex];
        questionText.innerText = q.text;
        optionsContainer.innerHTML = '';
        const letters = ['A','B','C'];
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerHTML = `<span class="option-prefix">${letters[idx]}</span><span>${opt}</span>`;
            btn.addEventListener('click', () => handleAnswer(letters[idx]));
            optionsContainer.appendChild(btn);
        });
        answered = false;
        setOptionsEnabled(true);
        feedbackMsg.innerHTML = "🤔 选择一个答案，答对自动下一题～";
        feedbackMsg.style.background = "#F8FBF4";
        illustration.innerHTML = `✨ 第 ${roundIndex+1} / 5 题 ✨`;
    }
    // 游戏结束
    function finishGame() {
        if (!gameActive) return;
        gameActive = false;
        stopTimer();
        clearAutoNext();
        const totalSeconds = Math.floor((Date.now() - startTimestamp) / 1000);
        questionText.innerText = `🎉 挑战完成！答对 ${correctCount}/5 题，用时 ${totalSeconds} 秒。`;
        optionsContainer.innerHTML = '';
        feedbackMsg.innerHTML = `🏆 ${studentClass}班 ${studentName} 得分 ${correctCount}/5，用时 ${totalSeconds}秒。点击「重玩」继续挑战！`;
        feedbackMsg.style.background = "#F1F5E9";
        setOptionsEnabled(false);
        illustration.innerHTML = "🏁🎓 圆满结束 🎓🏁";
        studentInfoRow.innerHTML = `🎓 ${studentClass}班 · ${studentName}  |  完成 ${correctCount}/5题`;
    }
    // 模态框 开始挑战
    function showStartModal() {
        if (gameActive) {
            feedbackMsg.innerHTML = "⚠️ 请先结束当前挑战（点击重玩）再开始新对局。";
            return;
        }
        const modalDiv = document.createElement('div');
        modalDiv.className = 'modal-mask';
        modalDiv.innerHTML = `
            <div class="modal-card">
                <h3>📖 数学小勇士</h3>
                <label>📚 班级</label>
                <select id="classSelectModal">
                    <option value="1">1班</option><option value="2">2班</option><option value="3">3班</option>
                    <option value="4">4班</option><option value="5">5班</option><option value="6">6班</option>
                    <option value="7">7班</option>
                </select>
                <label>🧒 姓名</label>
                <input type="text" id="nameInputModal" placeholder="你的名字" maxlength="10" autocomplete="off">
                <div class="modal-buttons">
                    <button id="modalConfirm">开始挑战</button>
                    <button id="modalCancel">取消</button>
                </div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        const confirmBtn = modalDiv.querySelector('#modalConfirm');
        const cancelBtn = modalDiv.querySelector('#modalCancel');
        const classSelect = modalDiv.querySelector('#classSelectModal');
        const nameInput = modalDiv.querySelector('#nameInputModal');
        confirmBtn.onclick = () => {
            const selectedClass = classSelect.value;
            const playerName = nameInput.value.trim() === "" ? "小英雄" : nameInput.value.trim();
            modalDiv.remove();
            startNewGame(selectedClass, playerName);
        };
        cancelBtn.onclick = () => modalDiv.remove();
    }
    // 开始全新游戏 (随机5题)
    function startNewGame(className, name) {
        // 随机抽5题
        const shuffled = [...QUESTION_BANK];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        currentRound = shuffled.slice(0,5);
        roundIndex = 0;
        correctCount = 0;
        answered = false;
        gameActive = true;
        studentClass = className;
        studentName = name;
        updateScoreUI();
        studentInfoRow.innerHTML = `📖 ${studentClass}班 · ${studentName}  |  进行中`;
        illustration.innerHTML = "✨ 第1题 ✨";
        startTimer();
        renderCurrent();
        clearAutoNext();
    }
    // 重置游戏（清空状态）
    function resetGame() {
        if (gameActive) {
            gameActive = false;
            stopTimer();
            clearAutoNext();
        }
        currentRound = [];
        roundIndex = 0;
        correctCount = 0;
        answered = false;
        updateScoreUI();
        studentInfoRow.innerHTML = "🧸 未开始挑战";
        illustration.innerHTML = "🧸📖";
        questionText.innerText = "点击下方绿色按钮开始挑战";
        optionsContainer.innerHTML = '';
        feedbackMsg.innerHTML = "🌱 选出答案，答对自动下一题";
        timerDisplay.innerText = "00:00";
        setOptionsEnabled(false);
    }
    // 重玩按钮逻辑
    function handleRestart() {
        resetGame();
        showStartModal();
    }
    // 事件绑定
    restartBtn.addEventListener('click', handleRestart);
    startBtn.addEventListener('click', showStartModal);
    
    resetGame();
</script>
</body>
</html>
